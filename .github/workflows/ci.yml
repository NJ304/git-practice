name: Laravel CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses:  actions/checkout@v3     

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Check PHP version
        run: php -v

      - name: Install Composer dependencies
        run: |
          if [ -f composer.json ]; then
            composer install
          else
            echo "No composer.json found"
          fi

      - name: List files
        run: ls -la  

      - name: Run Laravel commands (if exists)
        run: |
          if [ -f artisan ]; then
            php artisan --version
          else
            echo "No Laravel project found"
          fi  

