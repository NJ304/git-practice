name: Laravel CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses:  actions/checkout@v3     

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Check PHP version
        run: php -v

      - name: Install Composer dependencies
        run: composer install

      - name: List files
        run: ls -la  
